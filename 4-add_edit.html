<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Señor Shaعbi - Agregar/Editar</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#B02C33" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Señor Shaعbi" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#B02C33",
                        "primary-light": "#DF3D4C",
                        "accent": "#F79F3F",
                        "background": "#FFFAF8",
                        "card": "#ffffff",
                        "ink": "#2A1810",
                        "muted": "#8C6F64",
                        "border": "#EEDDD6",
                        "secondary": "#FFF1EB",
                    },
                    fontFamily: {
                        "display": ["DM Sans", "sans-serif"],
                        "serif": ["DM Sans", "sans-serif"],
                        "arabic": ["Tajawal", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .border-bookplate {
            border: 1px solid rgba(176,44,51,0.1);
            border-radius: 0.75rem;
        }

        .form-input {
            border: 1px solid rgba(176,44,51,0.15);
            border-radius: 0.5rem;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: #F79F3F;
            box-shadow: 0 0 0 3px rgba(247,159,63,0.15);
            outline: none;
        }

        .label-ui {
            font-family: 'Libre Franklin', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: #B02C33;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .arabic-rtl {
            direction: rtl;
            font-family: 'Amiri', serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DF3D4C; border-radius: 4px; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <script src="app.js"></script>
</head>

<body class="bg-background text-ink font-serif min-h-screen">
    <div class="relative flex h-auto min-h-screen w-full flex-col max-w-2xl mx-auto bg-background">
        <!-- TopAppBar -->
        <header class="sticky top-0 z-10 flex items-center p-4 justify-between shadow-lg relative" style="background: linear-gradient(135deg, #B02C33 0%, #8A1F25 100%);">
            <div class="absolute inset-0 opacity-[0.06] pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=%2240%22 height=%2240%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cpath d=%22M0 0h20v20H0zm20 20h20v20H20z%22 fill=%22%23fff%22 fill-opacity=%220.3%22/%3E%3C/svg%3E');"></div>
            <a href="2-home.html" class="relative text-white/80 flex items-center justify-center cursor-pointer hover:text-white transition-colors">
                <span class="material-symbols-outlined text-2xl">arrow_back</span>
            </a>
            <img src="new_logo_name_only.png" alt="Señor Shaعbi" class="relative h-7 object-contain flex-1 mx-4 brightness-0 invert" id="page-logo" />
            <div class="w-10"></div>
            <!-- Bottom accent line -->
            <div class="absolute bottom-0 left-0 right-0 h-[3px]" style="background: linear-gradient(90deg, #F79F3F 0%, #DF3D4C 50%, #B02C33 100%);"></div>
        </header>
        <!-- Form Content -->
        <main class="flex flex-col p-6 gap-8 pb-32">
            <form id="proverb-form">
                <!-- Image Upload Area -->
                <div class="flex flex-col mb-8">
                    <p class="label-ui mb-2">Imagen del Manuscrito</p>
                    <input type="file" id="image-input" accept="image/*" class="hidden">
                    <div id="image-preview" class="hidden mb-4">
                        <img id="preview-img" class="w-full h-48 object-cover rounded border-2 border-primary">
                    </div>
                    <div id="upload-area"
                        class="flex flex-col items-center gap-4 rounded-lg border-2 border-dashed border-accent/50 bg-accent/5 px-6 py-10 transition-colors hover:bg-accent/10 hover:border-accent cursor-pointer">
                        <div class="text-accent">
                            <span class="material-symbols-outlined text-4xl">history_edu</span>
                        </div>
                        <div class="flex flex-col items-center gap-1">
                            <p class="text-primary font-display text-sm font-bold tracking-wider">Arrastra la imagen aquí</p>
                            <p class="text-muted text-xs text-center">Sube una imagen en tono sepia para el archivo</p>
                        </div>
                        <button type="button" id="select-file-btn"
                            class="flex min-w-[120px] cursor-pointer items-center justify-center rounded-lg h-9 px-4 text-white text-xs font-ui font-bold tracking-widest uppercase shadow-md transition-all hover:shadow-lg" style="background: linear-gradient(135deg, #F79F3F 0%, #DF3D4C 100%);">
                            Seleccionar Archivo
                        </button>
                    </div>
                </div>
                <!-- Spanish Input -->
                <div class="flex flex-col gap-1 mb-8">
                    <label class="label-ui" for="spanish-phrase">Spanish Phrase (Origen) *</label>
                    <textarea required
                        class="form-input w-full bg-card p-3 text-lg font-display text-primary placeholder:text-muted/50 min-h-[100px]"
                        id="spanish-phrase" placeholder="E.g., Más vale pájaro en mano..."></textarea>
                </div>
                <!-- Arabic Input -->
                <div class="flex flex-col gap-1 mb-8">
                    <label class="label-ui" for="arabic-phrase">Arabic Equivalent (Naskh) *</label>
                    <textarea required
                        class="form-input w-full bg-card p-3 text-2xl arabic-rtl text-ink placeholder:text-muted/50 min-h-[100px]"
                        id="arabic-phrase" placeholder="...عصفور في اليد"></textarea>
                </div>
                <!-- English Translation -->
                <div class="flex flex-col gap-1 mb-8">
                    <label class="label-ui" for="english-translation">English Translation *</label>
                    <textarea required
                        class="form-input w-full bg-card p-3 text-lg text-muted placeholder:text-muted/50 min-h-[100px]"
                        id="english-translation" placeholder="A bird in the hand is worth two in the bush."></textarea>
                </div>

                <!-- Context / Usage Note -->
                <div class="flex flex-col gap-1 mb-8">
                    <label class="label-ui">Scholar's Note</label>
                    <textarea
                        class="form-input w-full bg-card p-3 text-base text-ink placeholder:text-muted/50 min-h-[80px]"
                        id="note" placeholder="Historical usage notes or regional variations..."></textarea>
                </div>
            </form>
        </main>
        <!-- Sticky Action Bar -->
        <footer
            class="fixed bottom-0 left-0 right-0 max-w-md mx-auto backdrop-blur-md border-t border-primary/10 p-4 flex gap-4 items-center" style="background: rgba(255,250,248,0.95);">
            <a href="2-home.html"
                class="flex-1 px-4 py-3 text-primary font-ui font-bold text-xs tracking-widest uppercase hover:text-primary-light transition-colors text-center border border-primary/20 rounded-lg">
                Cancelar
            </a>
            <button id="save-btn"
                class="flex-[2] text-white py-3 px-6 shadow-[0_4px_20px_rgba(247,159,63,0.35)] font-display font-bold text-sm tracking-[0.15em] uppercase hover:shadow-[0_6px_28px_rgba(247,159,63,0.45)] transition-all rounded-lg" style="background: linear-gradient(135deg, #DF3D4C 0%, #F79F3F 100%);">
                Guardar Registro
            </button>
        </footer>
    </div>
    <!-- Decorative Corner Accents -->
    <div
        class="fixed top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-accent/30 pointer-events-none m-4 hidden lg:block">
    </div>
    <div
        class="fixed bottom-0 right-0 w-16 h-16 border-b-2 border-r-2 border-accent/30 pointer-events-none m-4 hidden lg:block">
    </div>
    <script>
        // Add/Edit Form Logic
        const editId = localStorage.getItem('editProverbId');
        const isEditMode = !!editId;
        let selectedImageUrl = '';

        // Check if user is logged in
        if (!Auth.isLoggedIn()) {
            window.location.href = '5-login.html';
        }

        // Load existing data if editing
        if (isEditMode) {
            const proverb = DataStore.getById(editId);
            if (proverb) {
                document.getElementById('spanish-phrase').value = proverb.spanish;
                document.getElementById('arabic-phrase').value = proverb.arabic;
                document.getElementById('english-translation').value = proverb.english;
                document.getElementById('note').value = proverb.note || '';
                selectedImageUrl = proverb.image;
                
                if (proverb.image) {
                    document.getElementById('preview-img').src = proverb.image;
                    document.getElementById('image-preview').classList.remove('hidden');
                }
            }
        }

        // Image upload handling
        const imageInput = document.getElementById('image-input');
        const uploadArea = document.getElementById('upload-area');
        const selectFileBtn = document.getElementById('select-file-btn');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');

        selectFileBtn.onclick = () => imageInput.click();
        uploadArea.onclick = (e) => {
            if (e.target === selectFileBtn) return;
            imageInput.click();
        };

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('bg-card', 'border-primary');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('bg-card');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('bg-card');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImageFile(file);
            }
        });

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImageFile(file);
            }
        });

        function handleImageFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImageUrl = e.target.result;
                previewImg.src = selectedImageUrl;
                imagePreview.classList.remove('hidden');
                uploadArea.style.animation = 'fade-out 0.3s ease-out forwards';
                setTimeout(() => {
                    uploadArea.classList.add('hidden');
                }, 300);
            };
            reader.readAsDataURL(file);
        }

        // Form submission
        const form = document.getElementById('proverb-form');
        const saveBtn = document.getElementById('save-btn');

        saveBtn.onclick = (e) => {
            e.preventDefault();
            
            // Validate form
            if (!form.checkValidity()) {
                form.reportValidity();
                saveBtn.style.animation = 'shake 0.5s';
                setTimeout(() => saveBtn.style.animation = '', 500);
                return;
            }

            const proverbData = {
                spanish: document.getElementById('spanish-phrase').value,
                arabic: document.getElementById('arabic-phrase').value,
                english: document.getElementById('english-translation').value,
                category: 'General',
                note: document.getElementById('note').value || 'A proverb from the archive.',
                image: selectedImageUrl || 'https://lh3.googleusercontent.com/aida-public/AB6AXuC627i2fYdXyeGop_xctmHHRNJpxuLlxlDShW0IEl8YkA9oQGqKwyybs37iJ64EbcR3OfNPHBswfltpSAcmrEa1uE25BUyEMShzvc5Xz_H9LPrHzEVFcvfWAX8U7nqs4Q3pg9cvBHvLgSnjKhO_VhtHToJ2scGToSbb7eEgck6v0wmrQX_8-ZD1UqY4-sZk87zOtAMDwoTLDqiDm23wlo6Jjz-0TNW1IXFrJTKF5biBm_S18xmYQaVcszO2gQp-zgLmaB4ceSN6q_I'
            };

            // Save or update
            if (isEditMode) {
                DataStore.update(editId, proverbData);
                localStorage.removeItem('editProverbId');
                UI.showToast('¡Entrada actualizada exitosamente!');
            } else {
                DataStore.add(proverbData);
                UI.showToast('¡Entrada guardada en el archivo!');
            }

            // Animate and redirect
            saveBtn.style.animation = 'pulse 0.3s ease-out';
            setTimeout(() => {
                window.location.href = '2-home.html';
            }, 800);
        };
    </script>
    <script src="pwa.js"></script>
</body>

</html>
