<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Señor Shaعbi - Detalle</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#B02C33" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Señor Shaعbi" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#B02C33",
                        "primary-light": "#DF3D4C",
                        "accent": "#F79F3F",
                        "background": "#FFFAF8",
                        "card": "#ffffff",
                        "ink": "#2A1810",
                        "muted": "#8C6F64",
                        "border": "#EEDDD6",
                        "secondary": "#FFF1EB",
                    },
                    fontFamily: {
                        "display": ["DM Sans", "sans-serif"],
                        "serif": ["DM Sans", "sans-serif"],
                        "arabic": ["Tajawal", "sans-serif"],
                    },
                    boxShadow: {
                        "card": "0 1px 3px 0 rgba(42, 24, 16, 0.08), 0 1px 2px 0 rgba(42, 24, 16, 0.04)"
                    }
                },
            },
        }
    </script>
    <style>
        .drop-cap {
            float: left;
            font-size: 3.5rem;
            line-height: 0.9;
            padding-right: 0.15em;
            color: #B02C33;
            font-family: "Cinzel Decorative", serif;
        }

        .border-bookplate {
            border: 1px solid rgba(176,44,51,0.1);
            border-radius: 0.75rem;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        html {
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DF3D4C; border-radius: 4px; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <script src="app.js"></script>
</head>

<body class="bg-background min-h-screen font-serif text-ink flex flex-col">
    <!-- Top App Bar -->
    <nav class="sticky top-0 z-50 shadow-lg relative" style="background: linear-gradient(135deg, #B02C33 0%, #8A1F25 100%);">
        <div class="absolute inset-0 opacity-[0.06] pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=%2240%22 height=%2240%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cpath d=%22M0 0h20v20H0zm20 20h20v20H20z%22 fill=%22%23fff%22 fill-opacity=%220.3%22/%3E%3C/svg%3E');"></div>
        <div class="relative flex items-center justify-between p-4 max-w-7xl mx-auto w-full">
            <a href="2-home.html" class="flex items-center text-white/80 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-2xl">arrow_back</span>
                <span class="ml-2 font-ui text-sm font-medium hidden sm:block">Volver al Archivo</span>
            </a>
            <img src="new_logo_name_only.png" alt="Señor Shaعbi" class="h-7 object-contain brightness-0 invert" />
            <button id="bookmark-btn" class="flex items-center text-white/80 hover:text-accent transition-colors">
                <span class="material-symbols-outlined text-2xl">bookmark</span>
            </button>
        </div>
        <!-- Bottom accent line -->
        <div class="absolute bottom-0 left-0 right-0 h-[3px]" style="background: linear-gradient(90deg, #F79F3F 0%, #DF3D4C 50%, #B02C33 100%);"></div>
    </nav>
    <!-- Main Content Area -->
    <main class="flex-grow w-full bg-background">
        <!-- Hero Image -->
        <div class="w-full h-64 md:h-80 overflow-hidden relative">
            <img id="proverb-image" src="" alt="Proverb illustration" class="w-full h-full object-cover">
            <!-- Gradient overlay at bottom -->
            <div class="absolute bottom-0 left-0 right-0 h-24" style="background: linear-gradient(to top, #FFFAF8 0%, transparent 100%);"></div>
        </div>
        
        <!-- Content Card -->
        <div class="max-w-4xl mx-auto -mt-8 relative z-10">
            <div class="bg-card border-bookplate shadow-lg mx-4 p-6 md:p-10 space-y-8 relative overflow-hidden" id="proverb-content">
                <!-- Top accent bar on content card -->
                <div class="absolute top-0 left-0 right-0 h-1" style="background: linear-gradient(90deg, #B02C33 0%, #DF3D4C 40%, #F79F3F 100%);"></div>
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </main>
    
    <!-- Admin Action Bar -->
    <div class="sticky bottom-0 w-full border-t border-primary/10 p-4 shadow-lg z-40" id="admin-actions" style="display: none; background: linear-gradient(135deg, #B02C33 0%, #8A1F25 100%);">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <button id="delete-btn"
                class="text-white/70 hover:text-white font-ui text-sm font-medium flex items-center gap-2 px-4 py-2 transition-colors">
                <span class="material-symbols-outlined text-lg">delete</span>
                Eliminar
            </button>
            <a href="4-add_edit.html" id="edit-btn"
                class="bg-accent text-white hover:bg-accent/90 transition-all rounded-lg px-6 py-2.5 font-ui text-sm font-medium flex items-center gap-2 shadow-md">
                <span class="material-symbols-outlined text-lg">edit_note</span>
                Editar
            </a>
        </div>
    </div>
    <script>
        // Detail View Logic
        const proverbId = localStorage.getItem('currentProverbId');
        const proverb = DataStore.getById(proverbId);

        if (!proverb) {
            window.location.href = '2-home.html';
        } else {
            // Render proverb content
            const content = document.getElementById('proverb-content');
            const heroImage = document.getElementById('proverb-image');
            
            // Set hero image
            heroImage.src = proverb.image;
            heroImage.alt = proverb.spanish;
            
            content.innerHTML = `
                <!-- Spanish Section -->
                <section class="pt-4" style="animation: fade-in 0.4s ease-out">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="material-symbols-outlined text-accent text-sm">history_edu</span>
                        <span class="text-accent font-ui text-xs font-bold uppercase tracking-wide">Origen (Español)</span>
                    </div>
                    <p class="text-primary font-display text-2xl md:text-3xl leading-snug font-bold">
                        ${proverb.spanish}
                    </p>
                </section>
                
                <!-- Divider -->
                <div class="my-6 h-px" style="background: linear-gradient(90deg, #B02C33, #DF3D4C, #F79F3F, transparent); animation: fade-in 0.5s ease-out"></div>
                
                <!-- Arabic Section -->
                <section class="text-right" dir="rtl" style="animation: fade-in 0.6s ease-out">
                    <div class="flex items-center gap-2 mb-3 justify-end">
                        <span class="text-accent font-ui text-xs font-bold uppercase tracking-wide">Equivalente (Árabe)</span>
                        <span class="material-symbols-outlined text-accent text-sm">translate</span>
                    </div>
                    <p class="font-arabic text-2xl md:text-3xl leading-relaxed text-ink">
                        ${proverb.arabic}
                    </p>
                </section>
                
                <!-- English Translation -->
                <section style="animation: fade-in 0.7s ease-out">
                    <div class="flex items-center gap-2 mb-3">
                        <span class="material-symbols-outlined text-accent text-sm">language</span>
                        <span class="text-accent font-ui text-xs font-bold uppercase tracking-wide">Traducción (Inglés)</span>
                    </div>
                    <p class="font-newsreader text-lg md:text-xl text-muted">
                        "${proverb.english}"
                    </p>
                </section>
                
                <!-- Usage Note -->
                <div class="space-y-4" style="animation: fade-in 0.8s ease-out">
                    <div>
                        <h4 class="text-ink font-ui text-sm font-bold mb-2">Definición</h4>
                        <p class="font-serif text-muted text-sm leading-relaxed text-right">
                            ${proverb.note}
                        </p>
                    </div>
                    
                    <div class="pt-4 border-t border-primary/10">
                        <h4 class="text-ink font-ui text-sm font-bold mb-2">Ejemplo de Uso</h4>
                        <div class="p-4 rounded-lg border-l-3" style="background: linear-gradient(90deg, rgba(247,159,63,0.08), rgba(223,61,76,0.04)); border-left: 3px solid #F79F3F;">
                            <p class="font-serif text-ink text-sm leading-relaxed">
                                <span class="text-accent font-ui text-xs uppercase block mb-1 font-bold">Uso</span>
                                No hagas cosas sin sentido, recuerda que el que come pan con leche se duerme.
                            </p>
                        </div>
                    </div>
                </div>
            `;

            // Bookmark button
            const bookmarkBtn = document.getElementById('bookmark-btn');
            const updateBookmarkIcon = () => {
                const p = DataStore.getById(proverbId);
                bookmarkBtn.innerHTML = `<span class="material-symbols-outlined" style="font-size: 24px; font-variation-settings: 'FILL' ${p.bookmarked ? 1 : 0};">bookmark</span>`;
            };
            updateBookmarkIcon();

            bookmarkBtn.onclick = () => {
                DataStore.toggleBookmark(proverbId);
                updateBookmarkIcon();
                bookmarkBtn.style.animation = 'none';
                setTimeout(() => {
                    bookmarkBtn.style.animation = 'pulse 0.3s ease-out';
                }, 10);
                UI.showToast(proverb.bookmarked ? 'Marcador eliminado' : '¡Marcado!');
            };

            // Show admin actions if logged in
            if (Auth.isLoggedIn()) {
                document.getElementById('admin-actions').style.display = 'block';
                
                // Delete button
                document.getElementById('delete-btn').onclick = () => {
                    UI.confirm('¿Estás seguro de que quieres eliminar este refrán?', () => {
                        DataStore.delete(proverbId);
                        UI.showToast('Refrán eliminado', 'success');
                        setTimeout(() => {
                            window.location.href = '2-home.html';
                        }, 1000);
                    });
                };

                // Edit button - store ID for edit page
                document.getElementById('edit-btn').onclick = (e) => {
                    e.preventDefault();
                    localStorage.setItem('editProverbId', proverbId);
                    window.location.href = '4-add_edit.html';
                };
            }
        }
    </script>
    <script src="pwa.js"></script>
</body>

</html>
