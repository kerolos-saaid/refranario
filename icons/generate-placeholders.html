<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PWA Icons</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .icon-item {
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            border-radius: 8px;
            max-width: 100%;
        }
        button {
            background: #2d8659;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover {
            background: #3a9d6d;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: #2d8659;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Refranario PWA Icon Generator</h1>
    <p>Click "Generate Icons" to create placeholder icons for the PWA.</p>
    
    <button onclick="generateAllIcons()">Generate All Icons</button>
    <button onclick="downloadAll()">Download All</button>
    
    <div class="icon-grid" id="icon-grid"></div>

    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const icons = {};

        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#2d8659';
            ctx.fillRect(0, 0, size, size);

            // Book icon
            const scale = size / 512;
            ctx.save();
            ctx.translate(size / 2, size / 2);
            ctx.scale(scale, scale);

            // Left page
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.moveTo(-80, -120);
            ctx.lineTo(-80, 120);
            ctx.lineTo(0, 100);
            ctx.lineTo(0, -100);
            ctx.closePath();
            ctx.fill();

            // Right page
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.beginPath();
            ctx.moveTo(0, -100);
            ctx.lineTo(0, 100);
            ctx.lineTo(80, 120);
            ctx.lineTo(80, -120);
            ctx.closePath();
            ctx.fill();

            // Spine
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(-5, -120, 10, 240);

            // Text lines
            ctx.strokeStyle = 'rgba(45, 134, 89, 0.6)';
            ctx.lineWidth = 3;
            
            // Left page lines
            ctx.beginPath();
            ctx.moveTo(-70, -80);
            ctx.lineTo(-10, -80);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-70, -50);
            ctx.lineTo(-10, -50);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(-70, -20);
            ctx.lineTo(-10, -20);
            ctx.stroke();

            // Right page lines
            ctx.beginPath();
            ctx.moveTo(70, -80);
            ctx.lineTo(10, -80);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(70, -50);
            ctx.lineTo(10, -50);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(70, -20);
            ctx.lineTo(10, -20);
            ctx.stroke();

            // Center dot
            ctx.fillStyle = '#f5f5f5';
            ctx.beginPath();
            ctx.arc(0, 0, 15, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            return canvas;
        }

        function generateAllIcons() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = '';

            sizes.forEach(size => {
                const canvas = generateIcon(size);
                icons[size] = canvas;

                const item = document.createElement('div');
                item.className = 'icon-item';
                item.innerHTML = `
                    <canvas width="${size}" height="${size}"></canvas>
                    <p>${size}x${size}</p>
                    <a href="#" class="download-link" onclick="downloadIcon(${size}); return false;">Download</a>
                `;
                
                const displayCanvas = item.querySelector('canvas');
                const ctx = displayCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0);
                
                grid.appendChild(item);
            });
        }

        function downloadIcon(size) {
            const canvas = icons[size];
            if (!canvas) return;

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}x${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function downloadAll() {
            sizes.forEach((size, index) => {
                setTimeout(() => downloadIcon(size), index * 200);
            });
        }

        // Generate on load
        window.addEventListener('load', generateAllIcons);
    </script>
</body>
</html>
