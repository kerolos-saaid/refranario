<body class="h-screen w-full overflow-hidden flex items-center justify-center relative" style="background: linear-gradient(145deg, #B02C33 0%, #8A1F25 40%, #5C1118 100%);">

    <div class="absolute bottom-0 left-0 w-full h-1" style="background: linear-gradient(90deg, transparent 0%, #DF3D4C 30%, #F79F3F 70%, transparent 100%);"></div>

    <div class="relative z-10 flex flex-col items-center justify-center p-6 animate-immersive-fade">

            setTimeout(() => { window.location.href = '2-home.html'; }, 3500);
        </script>
        <!-- Logo Image -->
        <div class="mb-6 relative">
            <!-- Outer soft glow -->
            <div class="absolute -inset-14 rounded-full blur-[60px] opacity-60" style="background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(247,159,63,0.3) 40%, transparent 100%);"></div>
            <!-- Solid white circle backdrop -->
            <div class="absolute inset-2 rounded-full bg-white/90 shadow-[0_0_60px_rgba(255,255,255,0.4)]"></div>
            <img src="new_logo_no_text.png" alt="Señor Shaعbi Logo" class="relative z-10 w-52 h-52 object-contain" />
        </div>
        <!-- Subtitle -->
        <p class="mt-2 font-sans text-white/60 text-xs uppercase tracking-[0.35em] text-center font-medium">
            El Archivo Trilingüe
        </p>
        <!-- Decorative divider -->
        <div class="mt-4 w-16 h-px" style="background: linear-gradient(90deg, transparent, #F79F3F, transparent);"></div>
    </div>
    <script src="pwa.js"></script>
