<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Scholar's Archive - Splash</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2d8659" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Refranario" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&amp;family=Crimson+Pro:ital,wght@0,400;0,600;1,400&amp;family=Libre+Franklin:wght@500&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d8659",
                        "background": "#f5f5f5",
                        "card": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Cinzel Decorative", "serif"],
                        "serif": ["Crimson Pro", "serif"],
                        "ui": ["Libre Franklin", "sans-serif"],
                    },
                    keyframes: {
                        immersiveFade: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '40%': { opacity: '1', transform: 'scale(1)' },
                            '80%': { opacity: '1', transform: 'scale(1)' },
                            '100%': { opacity: '0', transform: 'scale(1.05)' },
                        }
                    },
                    animation: {
                        'immersive-fade': 'immersiveFade 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards',
                    }
                },
            },
        }
    </script>
    <style>
        .antialiased-text {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-white h-screen w-full overflow-hidden flex items-center justify-center">
    <!-- Splash Container -->
    <div class="flex flex-col items-center justify-center p-6 animate-immersive-fade">
        <script>
            // Auto-redirect to home after animation completes
            setTimeout(() => {
                window.location.href = '2-home.html';
            }, 3500);
        </script>
        <!-- Logo Mark: Gold Foil SVG -->
        <!-- Simulating the Open Book + Quill icon with SVG -->
        <div class="mb-8 relative group">
            <!-- Glow effect behind the logo -->
            <div class="absolute -inset-4 bg-primary/10 rounded-full blur-xl opacity-50"></div>
            <svg class="relative z-10 text-primary drop-shadow-lg"
                data-alt="Golden icon of an open book with a feather quill pen" fill="none" height="120"
                viewbox="0 0 24 24" width="120" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3V21M12 3L9 6M12 3L15 6" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" stroke-width="1"></path>
                <!-- Book shape -->
                <path
                    d="M21 4H16.5C15.5 4 14.5 4.2 13.8 4.7C13.2 5.2 12.5 5.8 12 6.5C11.5 5.8 10.8 5.2 10.2 4.7C9.5 4.2 8.5 4 7.5 4H3V18H7.5C8.5 18 9.5 18.2 10.2 18.7C10.8 19.2 11.5 19.8 12 20.5C12.5 19.8 13.2 19.2 13.8 18.7C14.5 18.2 15.5 18 16.5 18H21V4Z"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                <!-- Quill Feather detail -->
                <path d="M18.5 2.5C18.5 2.5 20.5 4.5 20.5 8.5C20.5 12.5 16.5 16.5 16.5 16.5" stroke="currentColor"
                    stroke-linecap="round" stroke-width="1.5"></path>
                <path d="M17 14L20 11" stroke="currentColor" stroke-linecap="round" stroke-width="1"></path>
            </svg>
        </div>
        <!-- Brand Title -->
        <h1
            class="font-display text-primary text-2xl md:text-3xl tracking-[0.2em] font-bold text-center">
            REFRANARIO
        </h1>
        <!-- Subtitle -->
        <p class="mt-3 font-sans text-gray-600 text-xs uppercase tracking-widest text-center">
            The Trilingual Archive
        </p>
    </div>
    <script src="pwa.js"></script>
</body>

</html>
