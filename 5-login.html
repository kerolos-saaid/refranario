<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Señor Shaعbi - Acceso</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#B02C33" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Señor Shaعbi" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#B02C33",
                        "primary-light": "#DF3D4C",
                        "accent": "#F79F3F",
                        "background": "#FFFAF8",
                        "background-dark": "#FFF1EB",
                        "ink": "#2A1810",
                        "muted": "#8C6F64",
                        "red-wax": "#dc2626",
                    },
                    fontFamily: {
                        "display": ["DM Sans", "sans-serif"],
                        "serif": ["DM Sans", "sans-serif"],
                        "arabic": ["Tajawal", "sans-serif"],
                        "sans": ["DM Sans", "sans-serif"],
                    },
                    animation: {
                        'shake': 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        /* Custom Styles for Modern Clean Theme */
        .border-bookplate {
            border: 1px solid rgba(176,44,51,0.1);
            border-radius: 0.5rem;
        }

        .input-ledger {
            background-color: transparent;
            border-bottom: 2px solid rgba(176,44,51,0.2);
            transition: border-color 0.3s ease;
        }

        .input-ledger:focus {
            border-bottom-color: #F79F3F;
            box-shadow: none;
            outline: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DF3D4C; border-radius: 4px; }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <script src="app.js"></script>
</head>

<body class="text-ink font-serif antialiased min-h-screen flex flex-col relative" style="background: linear-gradient(145deg, #B02C33 0%, #8A1F25 40%, #5C1118 100%);">
    <!-- Decorative radial glows -->
    <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse at 20% 30%, rgba(247,159,63,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(223,61,76,0.12) 0%, transparent 50%);"></div>
    <!-- Subtle noise overlay -->
    <div class="absolute inset-0 pointer-events-none opacity-[0.04]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');"></div>
    <!-- Top accent line -->
    <div class="absolute top-0 left-0 w-full h-1 z-20" style="background: linear-gradient(90deg, transparent 0%, #F79F3F 30%, #DF3D4C 70%, transparent 100%);"></div>
    <!-- Main Content Area -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-4 sm:p-6 w-full">
        <!-- Access Modal / Ledger -->
        <div
            class="w-full max-w-md bg-white border-bookplate shadow-[0px_20px_60px_rgba(0,0,0,0.3)] p-8 sm:p-12 relative overflow-hidden group/modal rounded-xl">
            <!-- Decorative Corner Flourish (Top Left) -->
            <div class="absolute top-3 left-3 text-accent/30 select-none pointer-events-none">
                <span class="material-symbols-outlined text-3xl">
                    history_edu
                </span>
            </div>
            <!-- Decorative Corner Flourish (Bottom Right) -->
            <div class="absolute bottom-3 right-3 text-accent/30 select-none pointer-events-none rotate-180">
                <span class="material-symbols-outlined text-3xl">
                    history_edu
                </span>
            </div>
            <!-- Content Container -->
            <div class="flex flex-col items-center text-center space-y-8">
                <!-- Brand Mark -->
                <div class="flex flex-col items-center space-y-4">
                    <div class="text-primary flex items-center justify-center p-2">
                        <img src="new_logo_no_text.png" alt="Señor Shaعbi Logo" class="w-24 h-24 object-contain" />
                    </div>
                    <div>
                        <h1
                            class="font-display text-3xl text-primary font-bold tracking-wide uppercase leading-tight">
                            Acceso de Curador
                        </h1>
                        <p class="font-sans text-xs tracking-widest text-muted uppercase mt-2">
                            El Archivo del Académico
                        </p>
                    </div>
                    <!-- Divider -->
                    <div class="w-16 h-px mt-2" style="background: linear-gradient(90deg, #B02C33, #F79F3F);"></div>
                </div>
                <!-- Login Form -->
                <form action="#" class="w-full space-y-8 mt-4 text-left" method="POST" id="login-form">
                    <!-- Email Field -->
                    <div class="group">
                        <label class="block font-sans text-xs font-bold text-primary uppercase tracking-wider mb-2"
                            for="email">
                            Identidad (Correo)
                        </label>
                        <input autocomplete="email"
                            class="w-full input-ledger text-lg font-serif text-ink placeholder:text-muted/40 py-2 bg-transparent border-0 border-b-2 ring-0 focus:ring-0"
                            id="email" name="email" placeholder="curador@archivo.edu" type="email" required />
                    </div>
                    <!-- Password Field -->
                    <div class="group relative">
                        <label class="block font-sans text-xs font-bold text-primary uppercase tracking-wider mb-2"
                            for="password">
                            Contraseña
                        </label>
                        <input autocomplete="current-password"
                            class="w-full input-ledger text-lg font-serif text-ink placeholder:text-muted/40 py-2 bg-transparent border-0 border-b-2 ring-0 focus:ring-0"
                            id="password" name="password" placeholder="••••••••••••" type="password" required />
                        <!-- Error Message Placeholder (Hidden by default) -->
                        <p id="error-message" class="hidden text-red-wax text-sm mt-2 font-sans flex items-center gap-1">
                            <span class="material-symbols-outlined !text-sm">error</span>
                            <span id="error-text">Credenciales inválidas.</span>
                        </p>
                    </div>
                    <!-- Actions -->
                    <div class="pt-4 space-y-6">
                        <button
                            class="w-full text-white font-sans font-bold uppercase tracking-widest text-xs py-4 px-6 rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent transition-all duration-300 shadow-[0_4px_20px_rgba(223,61,76,0.3)] hover:shadow-[0_6px_28px_rgba(223,61,76,0.4)]" style="background: linear-gradient(135deg, #DF3D4C 0%, #B02C33 100%);"
                            type="submit">
                            Desbloquear Archivo
                        </button>
                        <div class="text-center">
                            <a class="inline-flex items-center gap-1 text-muted hover:text-accent font-serif text-base transition-colors duration-300 group/link"
                                href="2-home.html">
                                <span
                                    class="material-symbols-outlined !text-sm opacity-0 -ml-4 group-hover/link:opacity-100 group-hover/link:ml-0 transition-all duration-300">arrow_back</span>
                                <span>Volver a la vista pública</span>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- Footer / Copyright -->
        <div class="absolute bottom-4 left-0 right-0 text-center pointer-events-none">
            <p class="font-sans text-[10px] text-white/40 uppercase tracking-widest">
                Est. 2024 • Manuscrito Digitalizado
            </p>
        </div>
    </main>
    <script>
        // Login Logic
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validate inputs
            if (!email || !password) {
                errorText.textContent = 'Por favor completa todos los campos.';
                errorMessage.classList.remove('hidden');
                form.style.animation = 'shake 0.5s';
                setTimeout(() => form.style.animation = '', 500);
                return;
            }

            // Accept any email/password for prototyping
            if (Auth.login(email, password)) {
                errorMessage.classList.add('hidden');
                UI.showToast('¡Bienvenido, ' + email.split('@')[0] + '!');
                
                // Animate form out
                form.style.animation = 'fade-out 0.3s ease-out forwards';
                setTimeout(() => {
                    window.location.href = '2-home.html';
                }, 300);
            }
        });

        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            errorMessage.classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.add('hidden');
        });
    </script>
    <script src="pwa.js"></script>
</body>

</html>
