<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Refranario - Acceso</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2d8659" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Refranario" />
    <link rel="manifest" href="./manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&amp;family=Crimson+Pro:ital,wght@0,400;0,600;1,400&amp;family=Amiri:wght@400;700&amp;family=Libre+Franklin:wght@400;500;700&amp;family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d8659",
                        "background": "#f0f4f2",
                        "background-dark": "#e5e9e7",
                        "ink": "#1a1a1a",
                        "primary": "#2d8659",
                        "muted": "#6b7280",
                        "red-wax": "#dc2626",
                        "primary": "#2d8659",
                        "background": "#f0f4f2",
                        "background-dark": "#111721",
                    },
                    fontFamily: {
                        "display": ["Cinzel Decorative", "serif"],
                        "serif": ["Crimson Pro", "serif"],
                        "arabic": ["Amiri", "serif"],
                        "sans": ["Libre Franklin", "sans-serif"],
                        "newsreader": ["Newsreader", "serif"], // Keep original config font
                    },
                    backgroundImage: {
                        'background-texture': "url('https://www.transparenttextures.com/patterns/cream-paper.png')",
                    },
                    animation: {
                        'shake': 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
                        }
                    }
                },
            },
        }
    </script>
    <style>
        /* Custom Styles for Modern Clean Theme */
        .border-bookplate {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }

        .input-ledger {
            background-color: transparent;
            border-bottom: 2px solid #E5E5E5;
            transition: border-color 0.3s ease;
        }

        .input-ledger:focus {
            border-bottom-color: #2d8659;
            box-shadow: none;
            outline: none;
        }

        /* Paper texture overlay */
        .bg-paper-grain {
            background-image: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <script src="app.js"></script>
</head>

<body class="bg-background text-ink font-serif antialiased min-h-screen flex flex-col relative">
    <!-- Background Texture Layer -->
    <div class="absolute inset-0 bg-paper-grain pointer-events-none opacity-40 z-0 mix-blend-multiply"></div>
    <!-- Main Content Area -->
    <main class="relative z-10 flex-grow flex items-center justify-center p-4 sm:p-6 w-full">
        <!-- Access Modal / Ledger -->
        <div
            class="w-full max-w-md bg-white border-bookplate shadow-[0px_10px_30px_rgba(27,42,65,0.2)] p-8 sm:p-12 relative overflow-hidden group/modal">
            <!-- Decorative Corner Flourish (Top Left) -->
            <div class="absolute top-2 left-2 text-primary/20 select-none pointer-events-none">
                <span class="material-symbols-outlined text-4xl">
                    history_edu
                </span>
            </div>
            <!-- Decorative Corner Flourish (Bottom Right) -->
            <div class="absolute bottom-2 right-2 text-primary/20 select-none pointer-events-none rotate-180">
                <span class="material-symbols-outlined text-4xl">
                    history_edu
                </span>
            </div>
            <!-- Content Container -->
            <div class="flex flex-col items-center text-center space-y-8">
                <!-- Brand Mark -->
                <div class="flex flex-col items-center space-y-4">
                    <div class="text-primary flex items-center justify-center p-2">
                        <span class="material-symbols-outlined !text-6xl"
                            style="font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 48;">
                            local_library
                        </span>
                    </div>
                    <div>
                        <h1
                            class="font-display text-3xl text-primary font-bold tracking-wide uppercase leading-tight">
                            Acceso de Curador
                        </h1>
                        <p class="font-sans text-xs tracking-widest text-muted uppercase mt-2">
                            El Archivo del Académico
                        </p>
                    </div>
                    <!-- Divider -->
                    <div class="w-16 h-px bg-primary/50 mt-2"></div>
                </div>
                <!-- Login Form -->
                <form action="#" class="w-full space-y-8 mt-4 text-left" method="POST" id="login-form">
                    <!-- Email Field -->
                    <div class="group">
                        <label class="block font-sans text-xs font-bold text-primary uppercase tracking-wider mb-2"
                            for="email">
                            Identidad (Correo)
                        </label>
                        <input autocomplete="email"
                            class="w-full input-ledger text-lg font-serif italic text-ink placeholder:text-muted/40 py-2 bg-transparent border-0 border-b-2 ring-0 focus:ring-0"
                            id="email" name="email" placeholder="curador@archivo.edu" type="email" required />
                    </div>
                    <!-- Password Field -->
                    <div class="group relative">
                        <label class="block font-sans text-xs font-bold text-primary uppercase tracking-wider mb-2"
                            for="password">
                            Contraseña
                        </label>
                        <input autocomplete="current-password"
                            class="w-full input-ledger text-lg font-serif text-ink placeholder:text-muted/40 py-2 bg-transparent border-0 border-b-2 ring-0 focus:ring-0"
                            id="password" name="password" placeholder="••••••••••••" type="password" required />
                        <!-- Error Message Placeholder (Hidden by default) -->
                        <p id="error-message" class="hidden text-red-wax text-sm mt-2 font-sans flex items-center gap-1">
                            <span class="material-symbols-outlined !text-sm">error</span>
                            <span id="error-text">Credenciales inválidas.</span>
                        </p>
                    </div>
                    <!-- Actions -->
                    <div class="pt-4 space-y-6">
                        <button
                            class="w-full bg-primary text-primary font-sans font-bold uppercase tracking-widest text-xs py-4 px-6 hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300 shadow-md"
                            type="submit">
                            Desbloquear Archivo
                        </button>
                        <div class="text-center">
                            <a class="inline-flex items-center gap-1 text-muted hover:text-primary font-serif italic text-base transition-colors duration-300 group/link"
                                href="2-home.html">
                                <span
                                    class="material-symbols-outlined !text-sm opacity-0 -ml-4 group-hover/link:opacity-100 group-hover/link:ml-0 transition-all duration-300">arrow_back</span>
                                <span>Volver a la vista pública</span>
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <!-- Footer / Copyright -->
        <div class="absolute bottom-4 left-0 right-0 text-center pointer-events-none">
            <p class="font-sans text-[10px] text-muted uppercase tracking-widest opacity-60">
                Est. 2024 • Manuscrito Digitalizado
            </p>
        </div>
    </main>
    <script>
        // Login Logic
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validate inputs
            if (!email || !password) {
                errorText.textContent = 'Por favor completa todos los campos.';
                errorMessage.classList.remove('hidden');
                form.style.animation = 'shake 0.5s';
                setTimeout(() => form.style.animation = '', 500);
                return;
            }

            // Accept any email/password for prototyping
            if (Auth.login(email, password)) {
                errorMessage.classList.add('hidden');
                UI.showToast('¡Bienvenido, ' + email.split('@')[0] + '!');
                
                // Animate form out
                form.style.animation = 'fade-out 0.3s ease-out forwards';
                setTimeout(() => {
                    window.location.href = '2-home.html';
                }, 300);
            }
        });

        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            errorMessage.classList.add('hidden');
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.add('hidden');
        });
    </script>
    <script src="pwa.js"></script>
</body>

</html>
